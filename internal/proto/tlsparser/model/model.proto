syntax = "proto3";

package proto.tlsparser.model;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/k8spacket/k8spacket/internal/proto/tlsparser/model";

message Certificate {
  google.protobuf.Timestamp notBefore = 1;
  google.protobuf.Timestamp notAfter = 2;
  string serverChain = 3;
  google.protobuf.Timestamp lastScrape = 4;
}

message TLSDetails {
  string id = 1;
  string domain = 2;
  string dst = 3;
  uint32 port = 4;
  repeated string clientTLSVersions = 5;
  repeated string clientCipherSuites = 6;
  string usedTLSVersion = 7;
  string usedCipherSuite = 8;
  Certificate certificate = 9;
}

message TLSConnection {
  string id = 1;
  string src = 2;
  string srcName = 3;
  string srcNamespace = 4;
  string dst = 5;
  string dstName = 6;
  uint32 dstPort = 7;
  string domain = 8;
  string usedTLSVersion = 9;
  string usedCipherSuite = 10;
  google.protobuf.Timestamp lastSeen = 11;
}
